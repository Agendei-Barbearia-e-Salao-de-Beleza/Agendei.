spring.application.name=AgendeiAPI

# 🐘 Supabase PostgreSQL Configuration
# EXPLICAÇÃO: Substitua os valores abaixo pelos dados do seu projeto no Supabase
# Dashboard -> Settings -> Database -> Connection String (JDBC)

spring.datasource.url=jdbc:postgresql://db.vpalasmdcxnhpsbwmsqq.supabase.co:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=YOUR_DATABASE_PASSWORD
spring.datasource.driver-class-name=org.postgresql.Driver

# 🚀 HikariCP Connection Pool (Optimized for Free Tiers)
# Limita o número de conexões para não estourar o limite do Supabase Free
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.pool-name=AgendeiHikariPool

# 🛠 JPA / Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

